<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <title>AutoControl — Acceso</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;overflow:hidden;-webkit-font-smoothing:antialiased}

    .bg{position:fixed;inset:0;z-index:0}
    .bg-blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.3;animation:drift 10s ease-in-out infinite}
    .b1{width:600px;height:600px;background:radial-gradient(#3b82f6,transparent);top:-150px;left:-150px;animation-delay:0s}
    .b2{width:400px;height:400px;background:radial-gradient(#f59e0b,transparent);bottom:-100px;right:-100px;animation-delay:-4s}
    .b3{width:300px;height:300px;background:radial-gradient(#10b981,transparent);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-7s}
    @keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,-15px) scale(1.04)}66%{transform:translate(-15px,12px) scale(.96)}}

    .card{position:relative;z-index:10;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:44px 38px;width:100%;max-width:390px;margin:20px;box-shadow:0 32px 64px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08);animation:cardIn .6s cubic-bezier(.34,1.56,.64,1)}
    @keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

    .logo-wrap{text-align:center;margin-bottom:34px}
    .logo-icon{font-size:3rem;display:block;margin-bottom:10px;animation:pulse 3s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
    .logo-title{font-size:2rem;font-weight:800;color:#fff;letter-spacing:-1px}
    .logo-title span{color:#f59e0b}
    .logo-sub{font-size:.78rem;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;margin-top:6px}

    label{display:block;font-size:.74rem;font-weight:600;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
    .input-wrap{position:relative;margin-bottom:22px}
    .input-wrap input{width:100%;padding:13px 46px 13px 16px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;font-family:'Inter',sans-serif;font-size:1.05rem;color:#fff;letter-spacing:3px;transition:all .25s;outline:none}
    .input-wrap input::placeholder{letter-spacing:2px;color:rgba(255,255,255,.2);font-size:.88rem}
    .input-wrap input:focus{border-color:rgba(245,158,11,.6);background:rgba(255,255,255,.1);box-shadow:0 0 0 3px rgba(245,158,11,.12)}
    .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;opacity:.45;transition:opacity .2s;color:#fff}
    .toggle-pw:hover{opacity:.85}

    .btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:12px;font-family:'Inter',sans-serif;font-size:.95rem;font-weight:700;color:#1a1a1a;cursor:pointer;letter-spacing:.3px;box-shadow:0 8px 24px rgba(245,158,11,.35);transition:all .25s}
    .btn-login:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 30px rgba(245,158,11,.45)}
    .btn-login:disabled{opacity:.55;cursor:not-allowed;transform:none}

    .error-msg{display:none;margin-top:14px;padding:11px 14px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:9px;color:#fca5a5;font-size:.83rem;font-weight:500;text-align:center;animation:shake .4s ease}
    .error-msg.show{display:block}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

    .card-footer{margin-top:26px;text-align:center;font-size:.72rem;color:rgba(255,255,255,.18);letter-spacing:.5px}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top-color:#1a1a1a;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:7px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="bg">
    <div class="bg-blob b1"></div>
    <div class="bg-blob b2"></div>
    <div class="bg-blob b3"></div>
  </div>
  <div class="card">
    <div class="logo-wrap">
      <span class="logo-icon">🚗</span>
      <div class="logo-title">Auto<span>Control</span></div>
      <div class="logo-sub">Sistema de Vehículos</div>
    </div>
    <form id="loginForm">
      <label for="password">Contraseña de Acceso</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="••••••••" autofocus required>
        <button type="button" class="toggle-pw" id="togglePw" tabindex="-1">👁️</button>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Ingresar</button>
      <div class="error-msg" id="errorMsg">❌ Contraseña incorrecta</div>
    </form>
    <div class="card-footer">AutoControl · Acceso Restringido</div>
  </div>
  <script>
    document.getElementById('togglePw').addEventListener('click',()=>{
      const i=document.getElementById('password');
      i.type=i.type==='text'?'password':'text';
      document.getElementById('togglePw').textContent=i.type==='text'?'🙈':'👁️';
    });
    document.getElementById('loginForm').addEventListener('submit',async e=>{
      e.preventDefault();
      const btn=document.getElementById('loginBtn');
      const err=document.getElementById('errorMsg');
      btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Verificando...'; err.classList.remove('show');
      try{
        const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('password').value})});
        const d=await r.json();
        if(d.ok){btn.textContent='✅ Acceso concedido';btn.style.background='linear-gradient(135deg,#10b981,#059669)';setTimeout(()=>location.href='/',600);}
        else{err.classList.add('show');btn.disabled=false;btn.textContent='Ingresar';document.getElementById('password').value='';document.getElementById('password').focus();}
      }catch(ex){err.textContent='⚠️ Error de conexión';err.classList.add('show');btn.disabled=false;btn.textContent='Ingresar';}
    });
  </script>
</body>
</html>
